name: Semantic Release

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version for semantic-release'
        required: false
        type: string
        default: '24'
    secrets:
      GH_TOKEN:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs the full history to determine the next version
          persist-credentials: false # to avoid leaking credentials to third-party actions

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run build --if-present

      - name: Get npm token via OIDC
        run: |
          IDTOKEN=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npmjs" | jq -r '.value')
          NPM_TOKEN=$(curl -fsSL -X POST https://registry.npmjs.org/-/npm/v1/oidc/token \
            -H 'Content-Type: application/json' \
            --data-raw "{\"oidcToken\":\"${IDTOKEN}\"}" | jq -r '.token')
          echo "::add-mask::$NPM_TOKEN"
          echo "NPM_TOKEN=${NPM_TOKEN}" >> $GITHUB_ENV
          echo "NODE_AUTH_TOKEN=${NPM_TOKEN}" >> $GITHUB_ENV

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GIT_COMMITTER_NAME: scottobert
          GIT_COMMITTER_EMAIL: 13769142+scottobert@users.noreply.github.com
