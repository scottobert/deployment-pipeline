name: Semantic Release

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version for semantic-release'
        required: false
        type: string
        default: '24'
    secrets:
      GH_TOKEN:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release needs the full history to determine the next version
          persist-credentials: false # to avoid leaking credentials to third-party actions

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run build --if-present

      - name: Release
        id: release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_COMMITTER_NAME: scottobert
          GIT_COMMITTER_EMAIL: 13769142+scottobert@users.noreply.github.com

      - name: Publish to npm via OIDC
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view $(node -p "require('./package.json').name") version 2>/dev/null || echo "none")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "Version $CURRENT already published, skipping"
            exit 0
          fi
          npm config delete //registry.npmjs.org/:_authToken
          npm publish --provenance --access public
